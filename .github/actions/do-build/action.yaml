name: "Build image"
description: "Build image"
inputs:
  companion-ref:
    description: "Git tag/branch from the companion repository"
    required: true
    default: ""
  PACKER_GITHUB_API_TOKEN:
    description: ""
    required: false
    default: ""
outputs:
  companion-version:
    description: "The Companion version installed in the built image (contents of /opt/companion/BUILD)"
    value: ${{ steps.compress.outputs.companion-version }}
env:
  PACKER_CACHE_DIR: /tmp/packer_cache
runs:
  using: "composite"
  steps:
    - name: install packer
      shell: bash
      id: install-packer
      run: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
        sudo apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
        sudo apt-get update && sudo apt-get install -y packer

        CACHE_KEY=$(grep iso_checksum companionpi.pkr.hcl)
        echo "CACHE_KEY=${CACHE_KEY}" >> "$GITHUB_OUTPUT"

    - name: Restore image cache
      uses: actions/cache@v4
      with:
        path: /tmp/packer_cache
        key: ${{ steps.install-packer.outputs.CACHE_KEY }}

    - name: build image
      shell: bash
      run: |
        sudo packer init companionpi.pkr.hcl
        sudo packer build --var "build=${{ inputs.companion-ref }}" companionpi.pkr.hcl
      env:
        PACKER_GITHUB_API_TOKEN: ${{ inputs.PACKER_GITHUB_API_TOKEN }}

    - name: compress image
      id: compress
      shell: bash
      run: |
        cd output-companionpi

        sudo apt-get install -y zerofree
        device="$(sudo losetup --partscan --show --find image)"

        # Extract the installed Companion version from the image, so builds can be
        # named by their actual version instead of a placeholder. `p2` is the root
        # partition, and /opt/companion/BUILD holds the version string.
        sudo mkdir -p /mnt/companion-image
        sudo mount "${device}p2" /mnt/companion-image
        COMPANION_VERSION="$(sudo cat /mnt/companion-image/opt/companion/BUILD | tr -d '\r\n')"
        echo "Extracted Companion version: ${COMPANION_VERSION}"
        echo "companion-version=${COMPANION_VERSION}" >> "$GITHUB_OUTPUT"
        sudo umount /mnt/companion-image

        # zerofree requires the filesystem to be unmounted (done above)
        sudo zerofree "${device}p2"
        sudo losetup --detach "$device"

        sudo xz -z image
